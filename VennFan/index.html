<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VennFan</title>
  <meta name="description" content="VennFan is an Android app for creating customizable Venn-style diagrams.">
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7fbfb;
      color: #122326;
      line-height: 1.5;
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 32px 20px 44px;
      text-align: center;
    }
    img {
      width: 100%;
      max-width: 1000px;
      height: auto;
      border-radius: 18px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.12);
    }
    h1 { margin: 24px 0 8px; font-size: clamp(2rem, 7vw, 4rem); color: #006d77; }
    p { margin: 0 auto 22px; max-width: 620px; font-size: 1.1rem; }
    nav { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
    a {
      display: inline-block;
      padding: 10px 15px;
      border-radius: 999px;
      background: #006d77;
      color: #fff;
      text-decoration: none;
      font-weight: 650;
    }
    a.secondary { background: #20363a; }
    footer { margin-top: 30px; font-size: 0.9rem; color: #52666a; }
  </style>
</head>
<body>
  <main>
    <h1>VennFan</h1>
    <img src="Feature_graphic.png" alt="VennFan feature graphic">
    <p>Create clean, customizable Venn diagrams on Android, with export support for publication-ready figures.</p>
    <nav aria-label="VennFan links">
      <a href="https://play.google.com/store/apps/details?id=com.csbalint.vennfan">Google Play</a>
      <a class="secondary" href="https://arxiv.org/abs/2601.06980">Whitepaper</a>
      <a class="secondary" href="https://pypi.org/project/vennfan/">Python package</a>
      <a class="secondary" href="https://ai.elte.hu/csbalint/vennfan/vennfan.html">Demo website</a>
    </nav>
    <footer>© 2026 VennFan</footer>
  </main>
</body>
</html>
